<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hog Exe Matchup Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="./Hog Exe Matchup Codex_files/css2" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg-2: #111727;
    --gold: #ffc857;
    --gold-dim: #c89a3f;
    --red: #ff3a4c;
    --blue: #4ea8ff;
    --purple: #8a5cf6;
    --text: #e8ecf5;
    --text-dim: #8892a6;
    --border: #1f2a3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(138,92,246,0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,200,87,0.08), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(78,168,255,0.05), transparent 60%);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

  header {
    text-align: center;
    margin-bottom: 50px;
    padding: 30px 20px;
    border: 2px solid var(--gold);
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(255,200,87,0.05), rgba(138,92,246,0.05));
    position: relative;
  }
  header::before, header::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border: 2px solid var(--gold);
  }
  header::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
  header::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
  h1 {
    font-family: 'Bungee', cursive;
    font-size: clamp(2rem, 6vw, 3.8rem);
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.4);
    line-height: 1;
  }
  .subtitle {
    margin-top: 14px;
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .stat-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .stat-bar span b { color: var(--gold); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-btn {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-1px);
  }

  .matchup {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    margin-bottom: 14px;
    overflow: hidden;
    transition: all 0.3s ease;
    position: relative;
  }
  .matchup:hover { border-left-color: var(--red); }
  .matchup.open { border-left-color: var(--blue); background: #131a2e; }

  .matchup-header {
    display: flex;
    align-items: flex-start;
    padding: 16px 22px;
    cursor: pointer;
    user-select: none;
    gap: 18px;
    flex-wrap: wrap;
  }
  .matchup-header .num { padding-top: 4px; }
  .matchup-header .arrow { padding-top: 8px; margin-left: auto; }
  .num {
    font-family: 'Bungee', cursive;
    font-size: 1.8rem;
    color: var(--gold);
    min-width: 50px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  }
  .title-block { flex: 1; min-width: 200px; }
  .matchup-title {
    font-size: 1.4rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text);
  }
  .matchup-short {
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 400;
  }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .badge.hard { background: rgba(255,58,76,0.15); color: var(--red); border: 1px solid var(--red); }
  .badge.med  { background: rgba(255,200,87,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .badge.easy { background: rgba(78,168,255,0.15); color: var(--blue); border: 1px solid var(--blue); }
  .arrow {
    color: var(--gold);
    font-size: 1.3rem;
    transition: transform 0.3s;
  }
  .matchup.open .arrow { transform: rotate(180deg); }

  .content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    padding: 0 22px;
  }
  .matchup.open .content { max-height: 2000px; padding: 0 22px 24px 22px; }

  .content-inner {
    border-top: 1px dashed var(--border);
    padding-top: 18px;
  }
  .content h4 {
    font-size: 0.8rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .content ul {
    list-style: none;
    margin-bottom: 18px;
  }
  .content li {
    padding: 6px 0 6px 22px;
    position: relative;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--text);
    border-bottom: 1px dotted rgba(255,255,255,0.05);
  }
  .content li::before {
    content: '▸';
    position: absolute;
    left: 4px;
    color: var(--gold);
  }
  .content li strong { color: var(--gold); }
  .content li em { color: var(--red); font-style: normal; font-weight: 600; }

  footer {
    text-align: center;
    margin-top: 60px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  footer a { color: var(--gold); text-decoration: none; }

  /* ---------- Decks, search & filter ---------- */
  .card-index {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 14px 16px 4px;
    margin-bottom: 18px;
  }
  .index-label {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .index-hint {
    color: var(--text-dim);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0.5px;
    font-size: 0.7rem;
    margin-left: 8px;
  }
  .index-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .index-toggle {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .index-toggle:hover { color: var(--gold); border-color: var(--gold); }
  .index-body { transition: opacity 0.2s; }
  .index-body[hidden] { display: none; }

  .index-group { margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px dotted rgba(255,255,255,0.04); }
  .index-group:last-child { border-bottom: 0; }
  .index-group-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .index-group-count {
    color: var(--text-dim);
    margin-left: 4px;
    font-weight: 400;
  }
  /* Flat index row: a single flex-wrap line per category, with inline
     "5+ ⚡" / "4 ⚡" / "3- ⚡" pills as separators between cost buckets.
     Far more compact than one line per bucket after a filter narrows results. */
  .index-row-flat {
    align-items: center;
    gap: 5px;
  }
  .cost-label {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 3px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--gold);
    background: rgba(255,200,87,0.07);
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    margin: 0 4px 0 2px;
  }
  .cost-label:first-child { margin-left: 0; }
  .cost-elixir {
    color: var(--purple);
    font-size: 0.7rem;
    margin-left: 1px;
  }
  .player-deck-bar {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 2px solid var(--purple);
    padding: 10px 14px;
    margin: 30px 0 10px;
    opacity: 0.78;
  }
  .player-deck-bar:hover { opacity: 1; }
  .deck-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .deck-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
  }
  .deck-group { margin-bottom: 0; }
  .deck-group-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
  }
  /* Flex-wrap: sections sit next to each other when they fit, wrap when full.
     Each .deck-group sizes to its contents — no wasted columns. */
  .deck-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 22px;
    margin-bottom: 18px;
    align-items: flex-start;
  }
  .deck-grid > .deck-group {
    flex: 0 0 auto;
  }
  .deck-grid > .group-extras { flex-basis: 100%; }
  .deck-group-label { white-space: nowrap; }
  .card-chip {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px 4px 4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    color: var(--text);
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .card-chip:hover {
    border-color: var(--gold);
    background: rgba(255,200,87,0.08);
    transform: translateY(-1px);
  }
  .card-chip.active {
    border-color: var(--red);
    background: rgba(255,58,76,0.18);
    box-shadow: 0 0 0 1px var(--red) inset;
  }
  .card-chip img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    background: rgba(0,0,0,0.25);
    border-radius: 3px;
  }
  .card-chip-label {
    padding-right: 4px;
    letter-spacing: 0.5px;
  }
  .card-chip.mini { padding: 2px; gap: 0; }
  .card-chip.mini img { width: 40px; height: 40px; }
  .card-chip.mini .card-chip-label { display: none; }

  /* Fallback when the card icon 404s — show the name as text inside the chip. */
  .card-chip.no-img {
    background: rgba(255,200,87,0.06);
    border-style: dashed;
    border-color: var(--gold-dim);
  }
  .card-chip.no-img .card-chip-label {
    display: inline-block;
    padding: 4px 6px;
    font-size: 0.7rem;
    text-align: center;
    line-height: 1.1;
    color: var(--gold);
  }
  .card-chip.mini.no-img {
    width: 44px;
    min-width: 44px;
    height: 44px;
    align-items: center;
    justify-content: center;
  }
  .card-chip.mini.no-img .card-chip-label {
    font-size: 0.5rem;
    padding: 2px;
    max-width: 40px;
    word-break: break-word;
  }

  /* Win Conditions group gets a stronger accent so it's the first thing you see. */
  .index-group-emphasize .index-group-label {
    color: var(--gold);
    font-size: 0.8rem;
  }
  .index-group-emphasize .card-chip.mini {
    border-color: var(--gold-dim);
  }
  .index-group-emphasize .card-chip.mini:hover {
    border-color: var(--gold);
  }

  footer a { color: var(--gold); text-decoration: none; border-bottom: 1px dotted var(--gold-dim); }
  footer a:hover { border-bottom-style: solid; }

  .main-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 8px 0 6px;
  }
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    min-width: 220px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 11px 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--text-dim); }
  .diff-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .diff-btn {
    background: var(--bg-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .diff-btn:hover { border-color: var(--gold); color: var(--gold); }
  .diff-btn.active {
    background: rgba(255,200,87,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }
  .active-filters {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: rgba(255,58,76,0.05);
    border: 1px dashed var(--red);
  }
  .filter-tag-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-right: 4px;
  }
  .filter-tag {
    background: rgba(255,58,76,0.15);
    border: 1px solid var(--red);
    color: var(--text);
    padding: 4px 8px 4px 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .filter-tag img { width: 22px; height: 22px; object-fit: contain; }
  .filter-tag:hover { background: rgba(255,58,76,0.25); }
  .filter-clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-left: auto;
  }
  .filter-clear:hover { color: var(--gold); border-color: var(--gold); }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    border: 1px dashed var(--border);
    margin-bottom: 14px;
  }
  .matchup.universal { border-left-color: var(--purple); }
  .matchup.universal .num { color: var(--purple); }
  .matchup.universal .matchup-title { color: var(--purple); }
  .content h4 + .deck-row { margin-bottom: 18px; }

  @media (max-width: 600px) {
    .num { font-size: 1.4rem; min-width: 40px; }
    .matchup-title { font-size: 1.1rem; }
    .matchup-short { font-size: 0.85rem; }
    .matchup-header { padding: 14px 16px; gap: 12px; }
    .content { padding: 0 16px; }
    .matchup.open .content { padding: 0 16px 20px 16px; }
    .card-chip img { width: 30px; height: 30px; }
    .card-chip-label { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>HOG EXE CODEX</h1>
    <div class="subtitle">⚔ Matchup Guide • 24 Decks ⚔</div>
    <div class="stat-bar">
      <span>DECKS: <b>24</b></span>
      <span>SHOWING: <b id="stat-visible">24</b></span>
      <span>RUNTIME: <b>1H 43M</b></span>
      <span>META: <b>MAR 2026</b></span>
    </div>
  </header>

  <div id="card-index" class="card-index"></div>

  <div class="search-bar">
    <input id="search-input" type="search" placeholder="Search matchup, note, or card…" autocomplete="off">
    <div class="diff-row">
      <button type="button" class="diff-btn active" data-diff="all">All</button>
      <button type="button" class="diff-btn" data-diff="easy">Easy</button>
      <button type="button" class="diff-btn" data-diff="med">Medium</button>
      <button type="button" class="diff-btn" data-diff="hard">Hard</button>
    </div>
  </div>

  <div id="active-filters" class="active-filters"></div>

  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">▼ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">▲ Collapse All</button>
  </div>

  <div id="matchups"></div>

  <div id="player-deck-bottom" class="player-deck-bar"></div>

  <footer>
    <p>Based on Iso1_cr's matchup guide •
      <a href="https://www.youtube.com/watch?v=13_rx0x-rk0&amp;list=PLx_HedVtjNZd6L6w2fvAeFVi1EKn3Ks6Q&amp;index=4" target="_blank" rel="noopener">Watch the source video ↗</a>
    </p>
    <p style="margin-top:6px;">Tap any matchup to expand • Click any card icon to filter • Single result auto-opens</p>
  </footer>
</div>

<script src="./extra/codex.js"></script>
</body></html>
